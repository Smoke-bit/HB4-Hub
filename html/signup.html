<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | HB4 Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <div class="auth-container">

        <!-- Left Side -->

        <div class="auth-left">

            <div class="brand">

                <h1>College Hub</h1>

                <p>
                    Buy, sell and connect with students across your hostel.
                    A trusted marketplace exclusively for the campus community.
                </p>

            </div>

        </div>

        <!-- Right Side -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Create Account</h2>

                <p>Fill in your details to continue.</p>

                <form id="signupForm">

                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your full name" required>
                    </div>

                    <div class="input-group">
                        <label>Manipal Email</label>
                        <input type="email"
                               placeholder="name@learner.manipal.edu"
                               required>
                    </div>

                    <div class="input-group">
                        <label>Mobile Number</label>
                        <input type="tel"
                               maxlength="10"
                               placeholder="9876543210"
                               required>
                    </div>

                    <div class="input-group">

                        <label>Hostel</label>

                        <select required>

                          <option value="">Select Hostel</option>

                            <option>HB1</option>
                            <option>HB2</option>
                            <option>HB3</option>
                            <option>HB4 Boys</option>
                            <option>HB4 Girls</option>
                            <option>HB5</option>

                        </select>

                    </div>

                    <div class="input-group">
                        <label>Room Number</label>
                        <input type="text"
                               placeholder="e.g. 1017"
                               required>
                    </div>

                    <button type="submit">
                        Continue
                    </button>

                </form>

                <div class="auth-footer">

                    <p>
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="../js/signup.js"></script>

</body>

</html>
