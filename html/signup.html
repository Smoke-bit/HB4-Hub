<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | HB4 Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <div class="auth-container">

        <!-- Left Side -->

        <div class="auth-left">

            <div class="brand">

                <h1>College Hub</h1>

                <p>
                    Buy, sell and connect with students across your hostel.
                    A trusted marketplace exclusively for the campus community.
                </p>

            </div>

        </div>

        <!-- Right Side -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Create Account</h2>

                <p>Fill in your details to continue.</p>

                <form id="signupForm">

                    <div class="input-group">
                        <label>Full Name</label>
                        <input
                            type="text"
                            id="name"
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label>Manipal Email</label>
                        <input
                        type="email"
                        id="email"
                        placeholder="name@learner.manipal.edu"
                        required
                    >
                    </div>

                    <div class="input-group">
                        <label>Mobile Number</label>
                        <input
                            type="tel"
                            id="phone"
                            maxlength="10"
                            placeholder="9876543210"
                            required
                        >
                    </div>

                    <div class="input-group">

                        <label for="hostel">Hostel</label>

                        <select id="hostel" required>
                            <option value="" selected disabled>Select your hostel</option>

                            <option value="HB1">HB1</option>
                            <option value="HB2">HB2</option>
                            <option value="HB3">HB3</option>
                            <option value="HB4B">HB4 Boys</option>
                            <option value="HB4G">HB4 Girls</option>
                            <option value="HB5">HB5</option>
                        </select>

                    </div>

                    

                    <button type="submit" class="btn-primary">
                        Continue
                    </button>

                </form>

                <div class="auth-footer">

                    <p>
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="../js/signup.js"></script>

</body>

</html>
