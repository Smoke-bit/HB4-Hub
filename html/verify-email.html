<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify Email | HB4 Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

    <div class="auth-container">

        <!-- Left Side -->

        <div class="auth-left">

            <div class="brand">

                <h1>College Hub</h1>

                <p>
                    Almost there! Verify your college email to continue and
                    become a part of the trusted College Hub community.
                </p>

            </div>

        </div>

        <!-- Right Side -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Verify Your Email</h2>

                <p>
                    We've sent a 6-digit verification code to
                    <strong>your college email</strong>.
                </p>

                <form id="otpForm">

                    <div class="otp-container">

                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">
                        <input type="text" maxlength="1" class="otp-input">

                    </div>

                    <button type="submit">

                        Verify OTP

                    </button>

                </form>

                <div class="otp-footer">

                    <p>

                        Didn't receive the code?

                        <a href="#">Resend OTP</a>

                    </p>

                    <span id="timer">

                        Resend available in 00:59

                    </span>

                </div>

            </div>

        </div>

    </div>

    <script src="../js/verify-email.js"></script>

</body>

</html>
