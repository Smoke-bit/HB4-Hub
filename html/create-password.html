<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Password | HB4 Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">

</head>

<body>

<div class="auth-container">

    <!-- Left Side -->

    <div class="auth-left">

        <div class="brand">

            <h1>HB4 Hub</h1>

            <p>
                One last step. Create a secure password to protect your account.
            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="auth-right">

        <div class="auth-card">

            <h2>Create Password</h2>

            <p>Your account is almost ready.</p>

            <form id="passwordForm">

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="password"
                            placeholder="Create a password"
                            required>

                        <span class="toggle-password" id="togglePassword">
                            👁
                        </span>

                    </div>

                </div>

                <div class="input-group">

                    <label>Confirm Password</label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm password"
                            required>

                        <span class="toggle-password" id="toggleConfirm">
                            👁
                        </span>

                    </div>

                </div>

                <div class="strength">

                    <div class="strength-bar">

                        <div id="strengthFill"></div>

                    </div>

                    <span id="strengthText">
                        Password Strength
                    </span>

                </div>

                <div class="requirements">

                    <p id="length">❌ At least 8 characters</p>
                    <p id="upper">❌ One uppercase letter</p>
                    <p id="number">❌ One number</p>
                    <p id="special">❌ One special character</p>

                </div>

                <button type="submit">

                    Create Account

                </button>

            </form>

        </div>

    </div>

</div>

<script src="../js/create-password.js"></script>

</body>
</html>
