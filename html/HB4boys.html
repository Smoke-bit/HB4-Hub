<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HB4 Boys Marketplace | CollegeHub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/HB4boys.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

<header class="navbar">

    <div class="nav-left">

        <a href="home.html" class="logo">
            <h2>CollegeHub</h2>
        </a>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="HB4boys.html" class="active">HB4-Boys</a>
            <a href="Marketplace.html">Campus</a>
            <a href="sell.html">Sell</a>
        </div>

    </div>

    <div class="nav-right">

        <a href="#" class="notification-btn">
            <i class="fa-regular fa-bell"></i>
            <span class="notification-badge"></span>
        </a>

        <a href="profile.html" class="profile-btn">
            <i class="fa-regular fa-user"></i>
        </a>

        <a href="login.html" class="logout-btn">
            Logout
        </a>

    </div>

</header>


    <!-- ================= HERO ================= -->

    <section class="market-hero">

        <h1>HB4 Boys Marketplace</h1>

        <p>
            Buy. Sell. Trade.<br>
            Everything inside HB4.
        </p>

    </section>



    <!-- ================= SEARCH ================= -->

    <section class="market-search">

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                placeholder="Search for food, books, electronics..."
            >
        </div>

    </section>


    <!-- ================= CATEGORIES ================= -->

    <section class="categories">

        <button class="category active">All</button>
        <button class="category">🍔 Food</button>
        <button class="category">📚 Books</button>
        <button class="category">💻 Electronics</button>
        <button class="category">🎮 Gaming</button>
        <button class="category">👕 Clothes</button>
        <button class="category">⚽ Sports</button>
        <button class="category">📦 Others</button>

    </section>


    <!-- ================= MARKET HEADER ================= -->

    <section class="market-header">

        <h2>Latest Listings</h2>

        <button class="sort-btn">
            <i class="fa-solid fa-arrow-down-wide-short"></i>
            Newest
        </button>

    </section>


 
<!-- ================= PRODUCTS ================= -->

<section class="products-grid" id="productsGrid">

</section>
<!-- ================= FLOATING SELL BUTTON ================= -->

<a href="sell.html" class="sell-fab">
    <i class="fa-solid fa-plus"></i>
    Sell
</a>
<!-- ================= BUY MODAL ================= -->

<div class="buy-modal" id="buyModal">

    <div class="modal-box">

        <button class="close-modal" id="closeModal">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="modal-image">
            <!-- Product Image -->
        </div>

        <h2 id="modalTitle">
            Chicken Burger
        </h2>

        <p class="modal-price" id="modalPrice">
            ₹80
        </p>

        <div class="modal-info">

            <p>
                <strong>Seller</strong><br>
                <span id="modalSeller">@SnackDealer</span>
            </p>

            <p>
                <strong>Room</strong><br>
                <span id="modalRoom">HB4 - 318</span>
            </p>

            <p>
                <strong>Description</strong><br>
                <span id="modalDescription">
                    Freshly made chicken burger with fries.
                </span>
            </p>

        </div>

        <div class="modal-buttons">

            <button class="chat-btn">
                <i class="fa-regular fa-message"></i>
                Chat Seller
            </button>

            <button class="confirm-btn">
                Confirm Buy
            </button>

        </div>

    </div>

</div>
<!-- ================= BUY MODAL ================= -->

<div class="buy-modal" id="buyModal">

    <div class="modal-box">

        <button class="close-modal" id="closeModal">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="modal-image">

            <img id="modalImage" src="" alt="">

        </div>

        <div class="modal-content">

            <span
                class="category-tag"
                id="modalCategory">

            </span>

            <h2 id="modalName"></h2>

            <p
                class="modal-price"
                id="modalPrice">

            </p>

            <p
                class="modal-description"
                id="modalDescription">

            </p>

            <div class="modal-info">

                <p>

                    <i class="fa-regular fa-user"></i>

                    <span id="modalSeller"></span>

                </p>

                <p>

                    <i class="fa-solid fa-location-dot"></i>

                    Room

                    <span id="modalRoom"></span>

                </p>

            </div>

            <div class="modal-buttons">

                <button class="chat-btn">

                    <i class="fa-solid fa-message"></i>

                    Chat Seller

                </button>

                <button class="confirm-btn">

                    Buy Now

                </button>

            </div>

        </div>

    </div>

</div>

<script src="../js/HB4boys.js"></script>

</body>
</html>
