<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | HB4 Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <main class="auth-container">

        <!-- Left Section -->
        <section class="auth-left">

            <div class="brand">

                <h1>HB4 Hub</h1>

                <p>
                    The campus marketplace made for students.
                </p>

            </div>

        </section>

        <!-- Right Section -->
        <section class="auth-right">

            <div class="auth-card">

                <h2>Welcome Back</h2>

                <p>
                    Login using your Manipal email.
                </p>

                <form>

                    <div class="input-group">
                        <label>Email</label>
                        <input
                            type="email"
                            placeholder="name@learner.manipal.edu"
                            required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input
                            type="password"
                            placeholder="Enter password"
                            required>
                    </div>

                    <button type="submit">
                        Login
                    </button>

                </form>

                <div class="auth-footer">

                    <p>
                        Don't have an account?
                        <a href="signup.html">Create one</a>
                    </p>

                </div>

            </div>

        </section>

    </main>

    <script src="../js/login.js"></script>

</body>

</html>
