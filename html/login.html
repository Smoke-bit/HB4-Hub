<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | College Hub</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <div class="background-effects">

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>

    <div class="grid-overlay"></div>
    <div id="stars"></div>



    </div>

    <main class="auth-container">

        <!-- Left Section -->
        <section class="auth-left">

            <div class="brand fade-up">

    <h1>College Hub</h1>

    <p>
        Buy, sell and trade with verified students across your campus.
    </p>

    <div class="brand-features">

        <div class="feature">
            ✅ Verified student accounts
        </div>

        <div class="feature">
            💬 Direct chat with sellers
        </div>

        <div class="feature">
            ⚡ List an item in under 30 seconds
        </div>

    </div>

</div>

        </section>

        <!-- Right Section -->
        <section class="auth-right">

            <div class="auth-card glass-card fade-up">

                <h2>Welcome Back</h2>

                <p>
                    Login using your Manipal email.
                </p>

                <form id="loginForm">

                    <div class="input-group">
                        <label>Email</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="name@learner.manipal.edu"
                            required
                        >

                    <div class="input-group">
                        <label>Password</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter password"
                            required>
                    </div>

                    <button type="submit" class="btn-primary">
                        Login
                    </button>

                </form id="loginForm">

                <div class="auth-footer">

                    <p>
                        Don't have an account?
                        <a href="signup.html">Create one</a>
                    </p>

                </div>

            </div>

        </section>

    </main>
    <script src="../js/background.js"></script>
    <script src="../js/login.js"></script>

</body>

</html>
